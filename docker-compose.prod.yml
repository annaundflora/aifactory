# AI Factory production stack.
# Requires shared infrastructure running (deploy/infrastructure/).
#
# Setup:
#   1. Ensure 'web' network exists: docker network create web
#   2. Ensure infrastructure is running: cd /opt/infrastructure && docker compose up -d
#   3. cp .env.example .env && nano .env
#   4. docker compose -f docker-compose.prod.yml up -d --build

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: aifactory-app
    restart: unless-stopped
    expose:
      - "3000"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      ASSISTANT_BACKEND_URL: http://aifactory-backend:8000
      AUTH_SECRET: ${AUTH_SECRET}
      AUTH_GOOGLE_ID: ${AUTH_GOOGLE_ID}
      AUTH_GOOGLE_SECRET: ${AUTH_GOOGLE_SECRET}
      ALLOWED_EMAILS: ${ALLOWED_EMAILS}
      AUTH_TRUST_HOST: "true"
      AUTH_URL: https://acfactory.uk
      REPLICATE_API_TOKEN: ${REPLICATE_API_TOKEN}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
      R2_ACCESS_KEY_ID: ${R2_ACCESS_KEY_ID}
      R2_SECRET_ACCESS_KEY: ${R2_SECRET_ACCESS_KEY}
      R2_BUCKET_NAME: ${R2_BUCKET_NAME}
      R2_ENDPOINT: ${R2_ENDPOINT}
      R2_PUBLIC_URL: ${R2_PUBLIC_URL}
    networks:
      - web

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: aifactory-backend
    restart: unless-stopped
    expose:
      - "8000"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
      REPLICATE_API_TOKEN: ${REPLICATE_API_TOKEN}
      FRONTEND_URL: https://acfactory.uk
    networks:
      - web

networks:
  web:
    external: true
